syntax = "proto3";
package engine.v1;
option go_package = "github.com/aressim/internal/gen/engine/v1";

import "engine/v1/common.proto";

// ─────────────────────────────────────────────────────────────────────────────
// logistics.proto
//
// The supply chain model. Logistics is represented as a directed graph:
// strategic depots feed brigade support areas, which feed forward supply
// points, which feed individual units. The graph is stored as edges in
// SurrealDB (supply_link table). The adjudicator traverses this graph to
// compute each unit's LogisticsConnectivity (status.proto) every N ticks.
//
// Phase 1: Nodes and links are defined. Units track fuel/ammo depletion.
//          Supply resolution computes is_supplied and effectiveness_modifier.
// Phase 2: Full graph traversal implemented. Interdiction and bandwidth limits.
// Phase 3: Nodes connect to InfrastructureNodes (strategic.proto) and receive
//          commodities from the production layer.
// ─────────────────────────────────────────────────────────────────────────────

// A logistics node is the physical anchor of the supply chain.
// Types span the full logistics hierarchy from theater-level strategic depots
// down to battalion-level forward supply points.
message LogisticsNode {
  string            id                  = 1;  // UUID
  string            name                = 2;  // e.g. "47th BSB BSA", "Depot Bravo"
  string            side                = 3;
  string            nation_id           = 4;  // Phase 3: owning nation
  LogisticsNodeType type                = 5;
  Position          position            = 6;
  LogisticsCapacity capacity            = 7;  // Maximum stock levels
  LogisticsCapacity current_stock       = 8;  // Current on-hand quantities
  float             replenishment_rate  = 9;  // Supply units per sim-hour received from higher
  string            parent_node_id      = 10; // ID of higher logistics node in the chain
  float             health              = 11; // 0.0–1.0; reduced if node is attacked
  bool              is_active           = 12;

  // Connectivity: the node can only supply units if it is itself supplied.
  // Computed by supply resolution graph traversal.
  bool              is_supplied         = 13;

  // Phase 3: ID of the InfrastructureNode or Nation supplying this node.
  string            strategic_source_id = 14;
}

enum LogisticsNodeType {
  LOGISTICS_UNSPECIFIED      = 0;
  LOGISTICS_STRATEGIC_DEPOT  = 1;  // Theater/corps-level; receives from production
  LOGISTICS_BRIGADE_BSA      = 2;  // Brigade Support Area
  LOGISTICS_BATTALION_TRAINS = 3;  // Battalion-level trains
  LOGISTICS_FORWARD_SUPPLY   = 4;  // Forward supply point; closest to line of contact
  LOGISTICS_AIRFIELD         = 5;  // Aviation fuel and ordnance hub
  LOGISTICS_PORT             = 6;  // Maritime resupply hub
  LOGISTICS_MEDICAL          = 7;  // CASEVAC, level II/III medical treatment
}

// Stock quantities for each supply category.
// Kept at a coarse level in Phase 1 (abstracted "ammo units").
// Phase 3: each field maps 1:1 to a commodity_id in strategic.proto for
// precise stock accounting at the national level.
message LogisticsCapacity {
  float fuel_liters        = 1;  // All fuel types (abstracted in Phase 1)
  float ammo_units         = 2;  // 1 unit = enough ammo for 1 company to fight for 1 day
  float food_rations       = 3;  // Person-days of rations
  float spare_parts        = 4;  // Abstracted maintenance points (Phase 3: specific parts)
  float medical_supplies   = 5;
}

// A directed supply link between two nodes, or a node and a unit.
// Stored as a graph edge in SurrealDB: supply_link TYPE RELATION FROM ... TO ...
// The adjudicator evaluates interdiction and bandwidth each supply tick.
message SupplyLink {
  string         id             = 1;  // UUID
  string         from_id        = 2;  // Source: LogisticsNode.id or Unit.id
  string         to_id          = 3;  // Destination: LogisticsNode.id or Unit.id
  SupplyLinkType link_type      = 4;
  float          bandwidth      = 5;  // Supply units per sim-hour this link can carry
  float          length_m       = 6;  // Route length in meters
  bool           is_active      = 7;  // False = route physically closed (destroyed bridge, etc.)
  bool           is_interdicted = 8;  // True = enemy fires or maneuver have cut the route

  // Vulnerability score used to compute interdiction probability each tick.
  // Higher values = easier to cut (e.g., single-bridge routes, exposed roads).
  float          vulnerability  = 9;  // 0.0–1.0

  // Phase 3: which commodity this link carries (empty = all types)
  string         commodity_id   = 10;
}

enum SupplyLinkType {
  SUPPLY_LINK_UNSPECIFIED = 0;
  SUPPLY_LINK_ROAD        = 1;  // Truck convoy on improved road (MSR/ASR)
  SUPPLY_LINK_RAIL        = 2;  // Rail line; high bandwidth, fixed route
  SUPPLY_LINK_AIR         = 3;  // Fixed-wing or helicopter resupply
  SUPPLY_LINK_SEA         = 4;  // Maritime; requires functioning port on both ends
  SUPPLY_LINK_PIPELINE    = 5;  // Phase 3: fuel only; highest bandwidth per unit
}
