syntax = "proto3";
package engine.v1;
option go_package = "github.com/aressim/internal/gen/engine/v1";

import "engine/v1/common.proto"; // UnitDomain

// ── GuidanceType ──────────────────────────────────────────────────────────────
// How a munition homes on or navigates to its target.
// The adjudicator uses this to determine whether a munition updates its
// destination each tick (tracking) or flies to a fixed point (ballistic/GPS).

enum GuidanceType {
  GUIDANCE_UNSPECIFIED = 0;
  GUIDANCE_UNGUIDED    = 1;  // Ballistic / dumb-fire — fixed point at launch
  GUIDANCE_GPS         = 2;  // GPS/INS precision — fixed point, high accuracy
  GUIDANCE_RADAR       = 3;  // Active radar homing — tracks while shooter holds lock
  GUIDANCE_IR          = 4;  // Infrared seeker — fire-and-forget, always tracks
  GUIDANCE_LASER       = 5;  // Laser-guided — tracks illuminated spot (fixed point)
  GUIDANCE_WIRE        = 6;  // Wire / datalink-guided — operator tracks continuously
  GUIDANCE_SONAR       = 7;  // Acoustic sonar — torpedo self-homing, always tracks
}

enum WeaponEffectType {
  WEAPON_EFFECT_TYPE_UNSPECIFIED = 0;
  WEAPON_EFFECT_TYPE_ANTI_AIR = 1;
  WEAPON_EFFECT_TYPE_ANTI_SHIP = 2;
  WEAPON_EFFECT_TYPE_ANTI_ARMOR = 3;
  WEAPON_EFFECT_TYPE_LAND_STRIKE = 4;
  WEAPON_EFFECT_TYPE_SEAD = 5;
  WEAPON_EFFECT_TYPE_BALLISTIC_STRIKE = 6;
  WEAPON_EFFECT_TYPE_INTERCEPTOR = 7;
  WEAPON_EFFECT_TYPE_GUNFIRE = 8;
  WEAPON_EFFECT_TYPE_TORPEDO = 9;
}

// ── WeaponDefinition ──────────────────────────────────────────────────────────
// Global catalog entry describing a munition type.
// Authored once (seeded from Go defaults); referenced by WeaponState.weapon_id.

message WeaponDefinition {
  string id          = 1;  // Slug, e.g. "aam-aim120c-amraam"
  string name        = 2;  // Display name, e.g. "AIM-120C AMRAAM"
  string description = 3;

  // Domains this weapon can engage. A weapon that cannot engage a domain is
  // ignored when the adjudicator checks engagements against that domain.
  repeated UnitDomain domain_targets = 4;

  // Ballistic / kinematic parameters.
  float speed_mps           = 5;  // Projectile/missile speed in m/s
  float range_m             = 6;  // Maximum effective range in metres
  float probability_of_hit  = 7;  // 0–1; base probability, range-degraded at fire time

  // Guidance mechanism; determines tracking behaviour in AdvanceMunitions.
  GuidanceType guidance = 8;
  WeaponEffectType effect_type = 9;
}

// ── WeaponState ───────────────────────────────────────────────────────────────
// Live per-unit ammo count. Stored on Unit.weapons and updated by the
// adjudicator each time the weapon is fired.

message WeaponState {
  string weapon_id   = 1;  // Foreign key → WeaponDefinition.id
  int32  current_qty = 2;  // Rounds/missiles remaining
  int32  max_qty     = 3;  // Maximum the platform can carry (from loadout)
}
