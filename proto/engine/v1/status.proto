syntax = "proto3";
package engine.v1;
option go_package = "github.com/aressim/internal/gen/engine/v1";

// Current operational health of a unit. Updated each tick by the adjudicator.
message OperationalStatus {
  float personnel_strength   = 1; // 0.0–1.0 fraction of authorised strength
  float equipment_strength   = 2; // 0.0–1.0 fraction of organic equipment
  float combat_effectiveness = 3; // Derived composite score 0.0–1.0
  float fuel_level_liters    = 5;
  float morale               = 8; // 0.0–1.0
  float fatigue              = 9; // 0.0–1.0; high fatigue degrades effectiveness
  bool  is_active            = 14; // false = destroyed / withdrawn
  CombatEffects combat_effects = 15;
}

// Transient combat states applied by the adjudicator.
message CombatEffects {
  bool suppressed = 1; // Unit cannot initiate fire
  bool disrupted  = 3; // Formation broken, movement penalty
  bool routing    = 5; // Fleeing; control lost
}
