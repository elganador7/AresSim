syntax = "proto3";
package engine.v1;
option go_package = "github.com/aressim/internal/gen/engine/v1";

import "engine/v1/common.proto";

// ─────────────────────────────────────────────────────────────────────────────
// strategic.proto
//
// The strategic layer. Defines the macro-economic and industrial model that
// underpins the operational layer. Scaffolded in full from day one so that
// the operational schema never needs to be refactored to accommodate it.
//
// Phase 3 implementation. In Phases 1 and 2, these messages are defined and
// serializable, but the adjudicator's MacroTick function is a no-op.
//
// The strategic model is a stock-and-flow system:
//
//   Resources (mines, oil fields) → Processing (refineries, factories)
//     → Finished goods (fuel, vehicles, ammunition)
//       → Logistics network (strategic.proto ↔ logistics.proto)
//         → Unit consumption (logistics.proto ↔ status.proto)
//           → Attrition (status.proto → back to demand for Resources)
//
// Political will is the strategic center of gravity: when a nation's
// political_will reaches 0.0, it accepts armistice regardless of military
// strength remaining. This models the historical reality that wars end
// when one side's political leadership loses the will to continue.
// ─────────────────────────────────────────────────────────────────────────────

// A nation or faction. The strategic-level actor.
// One side may contain multiple allied nations, each with separate economies
// but sharing a common strategic objective.
message Nation {
  string   id                    = 1;  // UUID
  string   name                  = 2;  // e.g. "United States", "Russian Federation"
  string   side                  = 3;  // "Blue" or "Red" (or custom)
  string   iso_code              = 4;  // ISO 3166-1 alpha-3 for flag/symbol lookup

  // Economic capacity: all values are normalized indices (0.0–1.0) unless noted.
  float    gdp_index             = 5;  // Relative economic output capacity
  float    industrial_capacity   = 6;  // Fraction of GDP dedicated to war production
  float    mobilization_level    = 7;  // Fraction of national capacity committed (0–1)

  // Political will: the strategic center of gravity.
  // Degrades with: casualties, failed objectives, economic damage.
  // Improves with: victories, enemy attrition, alliance support.
  // When political_will reaches 0.0, the nation sues for peace.
  float    political_will        = 8;  // 0.0–1.0
  float    popular_support       = 9;  // 0.0–1.0: affects political_will decay rate

  // Alliances
  repeated string allied_nation_ids  = 10;
  repeated string hostile_nation_ids = 11;

  // Current commodity stockpiles (Commodity.id → quantity)
  // Stored as parallel arrays for proto3 compatibility.
  repeated string commodity_ids    = 12;
  repeated float  commodity_stocks = 13;  // Corresponds 1:1 with commodity_ids
}

// A node in the physical infrastructure network.
// Bridges the operational and strategic layers:
//   - Destroying a factory reduces production output (strategic effect).
//   - Destroying a port reduces logistics node replenishment rates (operational effect).
// This dual-link is why infrastructure is its own message type.
message InfrastructureNode {
  string             id                      = 1;  // UUID
  string             name                    = 2;  // e.g. "Mariupol Steel Works", "Novorossiysk Port"
  string             nation_id               = 3;
  InfrastructureType type                    = 4;
  Position           position                = 5;
  float              health                  = 6;  // 0.0–1.0; damaged by fires, repaired over time
  float              capacity                = 7;  // Output at 100% health (in commodity units/sim-day)
  string             output_commodity_id     = 8;  // What this node produces or processes
  float              repair_rate             = 9;  // Health per sim-day if not under attack
  bool               is_operational          = 10; // False if health < 0.1

  // Operational linkage: which logistics node this infrastructure feeds.
  // A port, for example, feeds the nearest strategic logistics depot.
  string             feeds_logistics_node_id = 11;
}

enum InfrastructureType {
  INFRA_UNSPECIFIED = 0;
  INFRA_FACTORY     = 1;  // Produces military vehicles, artillery, etc.
  INFRA_REFINERY    = 2;  // Processes crude oil into fuel
  INFRA_POWER_PLANT = 3;  // Powers factories; if destroyed, reduces factory capacity
  INFRA_PORT        = 4;  // Maritime import/export hub; feeds logistics chain
  INFRA_RAIL_HUB    = 5;  // Logistics multiplier; if destroyed, reduces supply bandwidth
  INFRA_AIRFIELD    = 6;  // Supports air operations; if destroyed, limits sorties
  INFRA_MINE        = 7;  // Extracts raw commodities (coal, iron ore, rare earth)
  INFRA_CITY        = 8;  // Population center; political will anchor point
  INFRA_FUEL_DEPOT  = 9;  // Bulk fuel storage
}

// A commodity is a strategic resource that flows through the economy.
// Raw commodities (oil, iron ore) are extracted, processed into finished
// goods (fuel, steel, vehicles), and consumed by military operations.
message Commodity {
  string        id                   = 1;  // e.g. "fuel_diesel", "fuel_jet", "steel", "ammo_155mm"
  string        display_name         = 2;  // e.g. "Diesel Fuel", "155mm Artillery Rounds"
  CommodityType type                 = 3;
  bool          is_critical          = 4;  // If stock reaches 0, tied units become non-operational

  // Per nation, stored in Nation.commodity_stocks[] indexed by Nation.commodity_ids[].
  // These are per-nation aggregate values. Specific node stocks are in LogisticsCapacity.
  float         base_consumption_rate = 5;  // Units per sim-day per division-equivalent force
  float         base_production_rate  = 6;  // Units per sim-day per producing InfrastructureNode
}

enum CommodityType {
  COMMODITY_UNSPECIFIED = 0;
  COMMODITY_RAW         = 1;  // Crude oil, iron ore, coal, rare earth minerals
  COMMODITY_PROCESSED   = 2;  // Refined fuel, steel, aluminum
  COMMODITY_MUNITION    = 3;  // Specific ammunition types
  COMMODITY_EQUIPMENT   = 4;  // Complete weapon systems (tanks, IFVs, aircraft)
  COMMODITY_FOOD        = 5;
  COMMODITY_MEDICAL     = 6;
}

// A commodity flow edge in the strategic graph.
// Represents the production and movement of goods between infrastructure nodes
// and logistics nodes. Stored as graph edges in SurrealDB alongside supply_links.
message CommodityFlow {
  string   flow_id      = 1;
  string   from_node_id = 2;  // InfrastructureNode producing or holding the commodity
  string   to_node_id   = 3;  // InfrastructureNode or LogisticsNode receiving it
  string   commodity_id = 4;
  float    rate         = 5;  // Units per sim-day flowing along this edge
  bool     is_active    = 6;  // False if route is physically severed
  bool     is_sanctioned = 7; // Phase 3: economic sanctions blocking the flow
}

// A production order: a nation dedicating industrial capacity to producing
// a specific commodity or weapon system. Production completes in
// completion_time_days sim-days and adds to the national stockpile.
message ProductionOrder {
  string   order_id              = 1;
  string   nation_id             = 2;
  string   facility_id           = 3;  // InfrastructureNode.id executing the order
  string   output_commodity_id   = 4;
  float    quantity              = 5;  // Units to produce
  float    completion_time_days  = 6;
  float    progress              = 7;  // 0.0–1.0 fraction complete
  bool     is_complete           = 8;
}
