syntax = "proto3";
package engine.v1;
option go_package = "github.com/aressim/internal/gen/engine/v1";

message Position {
  double lat      = 1; // Decimal degrees -90..+90
  double lon      = 2; // Decimal degrees -180..+180
  double alt_msl  = 3; // Meters above mean sea level
  double heading  = 4; // True north bearing 0–360°
  double speed    = 5; // Meters per second
}

message SimTime {
  double seconds_elapsed = 1;
  int64  tick_number     = 2;
}

enum WeatherState {
  WEATHER_UNSPECIFIED = 0;
  WEATHER_CLEAR       = 1;
  WEATHER_OVERCAST    = 2;
  WEATHER_FOG         = 3;
  WEATHER_RAIN        = 4;
  WEATHER_HEAVY_RAIN  = 5;
  WEATHER_SNOW        = 6;
  WEATHER_BLIZZARD    = 7;
}

message WeatherConditions {
  WeatherState state           = 1;
  float        visibility_km   = 2;
  float        wind_speed_mps  = 3;
  bool         precipitation   = 4;
  float        temperature_c   = 5;
  float        cloud_ceiling_m = 6;
}

message OperationResult {
  bool   success = 1;
  string error   = 2;
}

// ── Domain / Posture enums ────────────────────────────────────────────────────
// Kept in common.proto so weapon.proto and unit.proto can both import them
// without introducing a circular dependency.

enum UnitDomain {
  DOMAIN_UNSPECIFIED = 0;
  DOMAIN_LAND        = 1;
  DOMAIN_AIR         = 2;
  DOMAIN_SEA         = 3;
  DOMAIN_SUBSURFACE  = 4;
}

enum FormationPosture {
  POSTURE_UNSPECIFIED   = 0;
  POSTURE_TRAVELING     = 1;
  POSTURE_BOUNDING      = 2;
  POSTURE_DELIBERATE    = 3;
  POSTURE_HASTY_DEFENSE = 4;
  POSTURE_DUG_IN        = 5;
  POSTURE_DISPERSED     = 6;
  POSTURE_ASSAULT       = 7;
}

// ── Movement ──────────────────────────────────────────────────────────────────
// A single geographic point in a movement route.
message Waypoint {
  double lat     = 1;
  double lon     = 2;
  double alt_msl = 3;
}

// An ordered list of waypoints describing a unit's intended route.
// The first waypoint is the current destination; subsequent waypoints
// are queued and visited in order.
message MoveOrder {
  repeated Waypoint waypoints = 1;
  bool auto_generated = 2;
}
