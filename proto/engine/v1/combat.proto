syntax = "proto3";
package engine.v1;
option go_package = "github.com/aressim/internal/gen/engine/v1";

import "engine/v1/common.proto";
import "engine/v1/capabilities.proto";
import "engine/v1/unit.proto";

// ─────────────────────────────────────────────────────────────────────────────
// combat.proto
//
// The adjudicator's inputs and outputs for engagement resolution.
// Separate from orders.proto because combat resolution is computed by the
// engine, not commanded by the player.
//
// Adjudication model:
//   For each tick, the adjudicator collects all potential engagements
//   (attacker has a weapon with range >= distance to target, and has a valid
//   order authorizing engagement). Each engagement is resolved independently
//   by passing an EngagementInput to the resolution function, which returns
//   an EngagementResult. Effects in the result are then applied to the
//   target's OperationalStatus.
//
// Key design decisions:
//   - Combat is resolved after all movement for the tick completes.
//   - Engagement results are additive within a tick: multiple attackers can
//     suppress the same target simultaneously.
//   - The attacker expends ammunition proportional to rate_of_fire × dt.
//   - Indirect fire (fire missions) is resolved separately from direct fire
//     to allow for time-of-flight delays and observer adjustment.
// ─────────────────────────────────────────────────────────────────────────────

// Input to the combat resolution function for a single direct-fire engagement.
// The adjudicator constructs this from unit state and map data each tick.
message EngagementInput {
  string           attacker_id       = 1;
  string           defender_id       = 2;
  float            range_m           = 3;  // Current slant range at time of resolution
  WeaponClass      weapon_used       = 4;  // Weapon system selected by the adjudicator
  bool             attacker_moving   = 5;  // Degrades attacker accuracy
  bool             defender_moving   = 6;  // Moving targets are harder to kill but easier to suppress
  TerrainType      defender_terrain  = 7;  // Terrain at defender's position
  FormationPosture defender_posture  = 8;  // Defender's current posture (see unit.proto)
  bool             has_observer      = 9;  // For indirect fire: observed vs unobserved fire
  WeatherConditions weather          = 10;
  float            time_of_day_factor= 11; // 1.0 = daylight; <1.0 = night penalty if no NVG
  bool             attacker_has_nvg  = 12; // Night vision capable; negates time_of_day_factor
  bool             defender_suppressed = 13; // Suppressed defenders have reduced return fire
}

// Output of combat resolution for a single engagement.
// Applied to the defender's OperationalStatus by the adjudicator after
// all engagements for the tick have been resolved.
message EngagementResult {
  string  engagement_id      = 1;  // UUID for the event log
  string  attacker_id        = 2;
  string  defender_id        = 3;
  SimTime resolved_at        = 4;

  // Effects applied to the defender this tick from this engagement.
  float   attrition_dealt    = 5;  // Fraction of defender strength destroyed (0.0–1.0)
  bool    suppression_applied= 6;  // True = suppression ticks reset on defender
  bool    disruption_applied = 7;  // True = disruption applied to defender
  bool    mobility_kill      = 8;  // True = defender's mobility reduced

  // Ammunition consumed by the attacker.
  float   ammo_consumed_pct  = 9;  // Fraction of attacker's basic load expended this engagement

  // Hit probability this tick. Retained for analytics and event log.
  float   hit_probability    = 10; // 0.0–1.0: probability used in resolution
  bool    hit_landed         = 11; // Whether the engagement resulted in a hit

  // Human-readable description for the COP event log.
  // Example: "3-69 AR engages T-90 company at 2400m, 2 vehicles destroyed."
  string  narrative          = 12;
}

// Input for an indirect fire (artillery/rocket) mission.
// Separate from EngagementInput because:
//   1. Indirect fire has time-of-flight delay (rounds are in transit between ticks).
//   2. Accuracy is based on CEP (circular error probable) at range, not direct-aim.
//   3. An observed mission gets adjust ticks before fire for effect.
message IndirectFireMission {
  string         mission_id         = 1;
  string         firing_unit_id     = 2;
  string         observer_unit_id   = 3;   // Empty = unobserved
  Position       target_position    = 4;
  string         target_unit_id     = 5;   // If known
  AmmunitionType ammo_type          = 6;
  int32          rounds_fired       = 7;
  float          tof_seconds        = 8;   // Time of flight; rounds land tof_seconds after mission start
  float          cep_meters         = 9;   // Circular error probable at this range
  bool           observed           = 10;  // True = observer is spotting; improves accuracy
  int32          adjust_rounds      = 11;  // Rounds expended on registration before fire for effect
  WeatherConditions weather         = 12;
}

// Result of an indirect fire mission. Applied when tof_seconds have elapsed.
message IndirectFireResult {
  string          mission_id          = 1;
  string          firing_unit_id      = 2;
  SimTime         rounds_land_at      = 3;
  float           area_covered_m2     = 4;   // Area affected (based on rounds and ammo type)
  float           attrition_dealt     = 5;   // Total attrition across all targets in area
  bool            suppression_applied = 6;   // All units in area are suppressed
  repeated string affected_unit_ids   = 7;
  string          narrative           = 8;
}

// Air-to-surface strike result.
message AirStrikeResult {
  string  strike_id              = 1;
  string  aircraft_unit_id       = 2;
  string  target_unit_id         = 3;
  SimTime resolved_at            = 4;
  float   attrition_dealt        = 5;
  bool    aircraft_lost          = 6;   // True if defending AD engaged and killed aircraft
  float   aircraft_loss_pct      = 7;   // Fraction of sorties lost
  bool    suppression_applied    = 8;
  string  narrative              = 9;
}

// Combat power ratio used internally by the adjudicator for validation and
// historical reference. Not exposed to the frontend.
// The 3:1 attacker-to-defender ratio is a commonly cited doctrinal threshold
// for a deliberate attack to have a reasonable probability of success.
message CombatPowerAssessment {
  string attacker_id            = 1;
  string defender_id            = 2;
  float  attacker_combat_power  = 3;  // Computed from combat_effectiveness × echelon scalar
  float  defender_combat_power  = 4;
  float  ratio                  = 5;  // attacker / defender
  bool   attacker_has_advantage = 6;  // True if ratio >= scenario threshold (default 3.0)
}

// Terrain protection modifier applied to the defender's armor_rating.
// Adjudicator looks up terrain at the defender's position and applies this.
message TerrainModifier {
  TerrainType terrain                    = 1;
  float       protection_modifier        = 2;  // Multiplier on defender's effective armor_rating
  float       concealment_modifier       = 3;  // Multiplier on defender's signature values
  float       attacker_accuracy_modifier = 4;  // Multiplier on attacker's hit probability
}
