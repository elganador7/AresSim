syntax = "proto3";
package engine.v1;
option go_package = "github.com/aressim/internal/gen/engine/v1";

import "engine/v1/common.proto";
import "engine/v1/unit.proto";

message Scenario {
  string id             = 1; // UUID
  string name           = 2;
  string description    = 3;
  string classification = 4;
  string author         = 5;
  double start_time_unix = 6;
  string version        = 7;
  SimulationSettings settings = 8;
  MapSettings        map      = 9;
  repeated Unit      units    = 11;
}

message SimulationSettings {
  float tick_rate_hz = 1; // Adjudicator ticks per wall-second (default 10)
  float time_scale   = 2; // Sim-seconds per wall-second (default 1.0)
}

message MapSettings {
  WeatherConditions initial_weather = 4;
}

enum AdjudicationModel {
  ADJ_MODEL_UNSPECIFIED   = 0;
  ADJ_MODEL_DEFAULT       = 1;
  ADJ_MODEL_FAST          = 2;
  ADJ_MODEL_HIGH_FIDELITY = 3;
}
