syntax = "proto3";
package engine.v1;
option go_package = "github.com/aressim/internal/gen/engine/v1";

import "engine/v1/capabilities.proto";
import "engine/v1/common.proto";
import "engine/v1/status.proto";

// ─────────────────────────────────────────────────────────────────────────────
// intelligence.proto
//
// Intelligence products generated by the ISR layer and consumed by the
// adjudicator for fog-of-war (FOW) resolution.
//
// Phase 1: FOW is disabled by default. All units visible to all sides.
//          These types are defined but not evaluated by the adjudicator.
// Phase 2: Full FOW implementation. Each unit's DetectionStatus (status.proto)
//          is computed from the sensor network each tick using these types.
//
// Intelligence collection disciplines modeled:
//   SIGINT  – Signals intelligence: detects radio/radar emitters
//   HUMINT  – Human intelligence: patrol reports, observation posts
//   IMINT   – Imagery intelligence: ISR aircraft, UAV feeds
//   RADINT  – Radar intelligence: ground surveillance radar
// ─────────────────────────────────────────────────────────────────────────────

// A single contact report generated when one unit detects another.
// Created by the adjudicator's sensor resolution pass each tick.
// Multiple overlapping contact reports on the same target are fused into a
// single DetectionStatus (status.proto) at the highest DetectionQuality.
message ContactReport {
  string           report_id         = 1;  // UUID
  string           detecting_unit_id = 2;  // Unit that made the detection
  string           target_unit_id    = 3;  // Empty if target is unidentified
  SimTime          detected_at       = 4;
  Position         reported_position = 5;  // May differ from true position (sensor error)
  DetectionQuality quality           = 6;
  SensorType       sensor_used       = 7;
  float            confidence        = 8;  // 0.0–1.0: certainty of detection
  string           side              = 9;  // Reporting side ("Blue", "Red")
  bool             is_stale          = 10; // True if no confirming detection for N ticks
}

// An intelligence report representing a fused or human-reported intelligence
// product. Higher fidelity than a raw ContactReport; typically generated
// by HUMINT sources or after IMINT analysis.
message IntelligenceReport {
  string           report_id         = 1;
  SimTime          report_time       = 2;
  SimTime          info_cutoff       = 3;  // When the information was actually collected
  IntelSource      source            = 4;
  string           reporting_unit_id = 5;
  Position         target_position   = 6;
  string           target_unit_id    = 7;   // If positively identified
  UnitSizeEstimate size_estimate     = 8;
  string           activity          = 9;   // Free text: "moving east", "digging in", etc.
  string           side              = 10;
  float            reliability       = 11;  // 0.0–1.0: source reliability score
  float            accuracy          = 12;  // 0.0–1.0: information accuracy estimate
}

enum IntelSource {
  INTEL_SOURCE_UNSPECIFIED = 0;
  INTEL_SOURCE_SIGINT      = 1;
  INTEL_SOURCE_HUMINT      = 2;
  INTEL_SOURCE_IMINT       = 3;  // UAV/ISR aircraft imagery
  INTEL_SOURCE_RADINT      = 4;  // Ground surveillance radar
  INTEL_SOURCE_COMBAT      = 5;  // Direct contact report from engaging unit
  INTEL_SOURCE_POW         = 6;  // Prisoner of war report
}

// Coarse size estimate used when a unit cannot be precisely identified.
// Drives the symbol size rendered on the COP and the engagement priority
// assigned by the adjudicator.
enum UnitSizeEstimate {
  SIZE_UNSPECIFIED = 0;
  SIZE_INDIVIDUAL  = 1;  // 1–3 personnel
  SIZE_SMALL_UNIT  = 2;  // Squad to platoon
  SIZE_COMPANY     = 3;
  SIZE_BATTALION   = 4;
  SIZE_BRIGADE     = 5;
  SIZE_DIVISION    = 6;
}

// An active intelligence surveillance zone: an area being continuously
// watched by a specific sensor or ISR asset. While a unit is within a
// watched zone, its detection probability per tick is increased.
message SurveillanceZone {
  string      zone_id           = 1;
  string      owning_unit_id    = 2;  // ISR or sensor unit maintaining the watch
  Polygon     area              = 3;
  SensorType  sensor_type       = 4;
  float       detection_bonus   = 5;  // Added to base detection probability within zone
  bool        is_active         = 6;
  SimTime     expires_at        = 7;  // All-zeros = indefinite
}

// Electronic Order of Battle entry: a known enemy emitter.
// Generated by SIGINT detection; allows cueing of EW or fires.
message EmitterRecord {
  string     emitter_id         = 1;
  string     associated_unit_id = 2;  // If correlated to a known unit
  Position   last_known_pos     = 3;
  SimTime    last_detected_at   = 4;
  string     emitter_type       = 5;  // e.g. "VHF_RADIO", "FIRE_CONTROL_RADAR"
  float      frequency_mhz      = 6;
  bool       is_active_emitter  = 7;  // False = has gone silent
  string     side               = 8;
}
