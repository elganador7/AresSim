syntax = "proto3";
package engine.v1;
option go_package = "github.com/aressim/internal/gen/engine/v1";

// ─────────────────────────────────────────────────────────────────────────────
// capabilities.proto
//
// What a unit can do at full operational strength (100% personnel and
// equipment). These are baseline template values. The adjudicator multiplies
// every capability by OperationalStatus.combat_effectiveness to derive the
// actual performance for a given tick.
//
// Capability data is seeded from real-world references: FM 3-21.10,
// Jane's All the World's Aircraft, IHS Jane's Fighting Ships, and equivalent
// open-source doctrine for the modeled forces.
// ─────────────────────────────────────────────────────────────────────────────

// Full capability profile for a unit type at 100% strength.
// Stored in SurrealDB as part of the unit record; never mutated at runtime.
// Runtime degradation is tracked in OperationalStatus (status.proto).
message Capabilities {
  MobilityCapabilities  mobility   = 1;
  FirepowerCapabilities firepower  = 2;
  ProtectionCapabilities protection = 3;
  SensorCapabilities    sensors    = 4;
  LogisticsProfile      logistics  = 5;
  CommandCapabilities   command    = 6;  // Non-zero only for FUNCTION_COMMAND units
  EWCapabilities        ew         = 7;  // Non-zero only for FUNCTION_ELECTRONIC_WARFARE
}

// ─── MOBILITY ─────────────────────────────────────────────────────────────────
// Movement rates vary by terrain. All values in meters per second.
// These are sustained tactical rates, not peak vehicle speeds.
// A value of 0.0 means the terrain type is impassable for this unit.

message MobilityCapabilities {
  float         road_speed          = 1;  // m/s on improved road
  float         cross_country_speed = 2;  // m/s on open/firm terrain
  float         urban_speed         = 3;  // m/s in built-up areas
  float         forest_speed        = 4;  // m/s in forest (0 = impassable)
  float         mountain_speed      = 5;  // m/s on steep terrain (0 = impassable)
  float         river_crossing_speed= 6;  // m/s in/across water (0 = requires bridge)
  float         max_altitude_m      = 7;  // Ceiling in meters MSL (air units only)
  float         climb_rate_mps      = 8;  // Vertical rate of climb m/s (air units only)
  float         combat_radius_m     = 9;  // Max mission range before bingo fuel (air units)
  MobilityClass mobility_class      = 10;
  bool          amphibious          = 11; // Can conduct river/coastal crossings organically
  bool          air_transportable   = 12; // Can be lifted by transport aviation
}

enum MobilityClass {
  MOBILITY_UNSPECIFIED = 0;
  MOBILITY_FOOT        = 1;  // Dismounted infantry: ~1.4 m/s cross-country
  MOBILITY_WHEELED     = 2;  // Truck, MRAP, wheeled IFV
  MOBILITY_TRACKED     = 3;  // MBT, tracked IFV, SP artillery
  MOBILITY_ROTARY      = 4;  // Helicopter
  MOBILITY_FIXED       = 5;  // Fixed-wing aircraft
  MOBILITY_SURFACE     = 6;  // Naval surface vessel
  MOBILITY_SUBMARINE   = 7;
}

// ─── FIREPOWER ────────────────────────────────────────────────────────────────
// A unit may have multiple weapon systems. Each WeaponSystem represents one
// class of weapon (e.g., a tank battalion has a 120mm main gun AND a coaxial
// M240 MG). The adjudicator selects the optimal system for a given engagement
// based on target type, range, and available ammunition.

message FirepowerCapabilities {
  repeated WeaponSystem weapon_systems = 1;
}

message WeaponSystem {
  string         name                = 1;  // e.g. "120mm M256 Smoothbore", "AGM-114 Hellfire"
  WeaponClass    weapon_class        = 2;
  float          effective_range_m   = 3;  // Range to effective engagement (full accuracy)
  float          max_range_m         = 4;  // Maximum range (degraded accuracy beyond effective)
  float          min_range_m         = 5;  // Minimum arming distance (mortars, some missiles)
  float          rate_of_fire        = 6;  // Rounds (or salvos) per minute at sustained rate
  float          anti_armor_value    = 7;  // Penetration index vs armored targets, 0–100
  float          anti_personnel_value= 8;  // Lethality index vs dismounted infantry, 0–100
  float          anti_air_value      = 9;  // Effectiveness vs air targets, 0–100
  float          area_effect_radius_m= 10; // Blast/fragmentation radius in meters
  float          accuracy_modifier   = 11; // Multiplier on base hit probability (0.0–2.0)
  AmmunitionType ammo_type           = 12;
  float          rounds_per_basic_load = 13; // Ties into logistics consumption (Phase 3)
  bool           guided              = 14; // Guided munitions ignore most weather degradation
  bool           suppressive         = 15; // Generates suppression effect even without attrition
}

enum WeaponClass {
  WEAPON_CLASS_UNSPECIFIED       = 0;
  WEAPON_CLASS_DIRECT_KE         = 1;  // Kinetic energy: tank guns, autocannons
  WEAPON_CLASS_DIRECT_HEAT       = 2;  // Chemical energy: ATGM, RPG, HEAT rounds
  WEAPON_CLASS_DIRECT_SMALL_ARMS = 3;  // Small arms, HMG, 20–40mm autocannon
  WEAPON_CLASS_INDIRECT_HE       = 4;  // Artillery HE: 105mm, 122mm, 155mm, etc.
  WEAPON_CLASS_INDIRECT_CLUSTER  = 5;  // DPICM, submunitions
  WEAPON_CLASS_INDIRECT_PRECISION= 6;  // Excalibur, Krasnopol, GPS/laser-guided
  WEAPON_CLASS_SURFACE_TO_AIR    = 7;  // SAM systems
  WEAPON_CLASS_AIR_TO_AIR        = 8;  // AAM
  WEAPON_CLASS_AIR_TO_SURFACE    = 9;  // AGM, PGM, unguided bombs
  WEAPON_CLASS_CRUISE_MISSILE    = 10;
  WEAPON_CLASS_BALLISTIC_MISSILE = 11;
  WEAPON_CLASS_ROCKET_UNGUIDED   = 12; // BM-21 Grad, FROG-7
  WEAPON_CLASS_TORPEDO           = 13;
  WEAPON_CLASS_MINE              = 14;
  WEAPON_CLASS_EW_JAMMING        = 15; // Electronic attack
}

enum AmmunitionType {
  AMMO_UNSPECIFIED   = 0;
  AMMO_SABOT         = 1;  // APFSDS kinetic penetrator
  AMMO_HEAT          = 2;  // High explosive anti-tank
  AMMO_HE            = 3;  // High explosive general purpose
  AMMO_SMOKE         = 4;
  AMMO_ILLUMINATION  = 5;
  AMMO_GUIDED_ATGM   = 6;  // Anti-tank guided missile (Javelin, Kornet, etc.)
  AMMO_AAM_IR        = 7;  // Infrared-guided air-to-air
  AMMO_AAM_RADAR     = 8;  // Radar-guided air-to-air (SARH or ARH)
  AMMO_GUIDED_BOMB   = 9;  // JDAMs, Paveway
  AMMO_UNGUIDED_BOMB = 10;
  AMMO_ROCKET_POD    = 11; // Unguided 70mm/80mm rocket pods
  AMMO_TORPEDO       = 12;
  AMMO_CRUISE        = 13; // Tomahawk, Kalibr, etc.
  AMMO_BALLISTIC     = 14; // ATACMS, LORA, Iskander
  AMMO_SMALL_ARMS    = 15; // 5.56/7.62mm
  AMMO_AUTOCANNON    = 16; // 20–57mm
  AMMO_MORTAR_HE     = 17; // 60mm, 81mm, 120mm mortar
}

// ─── PROTECTION ───────────────────────────────────────────────────────────────

message ProtectionCapabilities {
  float armor_rating          = 1;  // Kinetic protection index (0–100). Reduces KE damage.
  float chemical_protection   = 2;  // CBRN protection fraction (0.0–1.0)
  float air_defense_rating    = 3;  // Organic AD protection (reduces air attack effectiveness)
  bool  active_protection     = 4;  // APS: intercepts HEAT/ATGM if true (adds deflection roll)
  float signature_radar       = 5;  // Radar cross section index: higher = easier to detect
  float signature_thermal     = 6;  // Thermal signature: higher = easier IR detection
  float signature_acoustic    = 7;  // Acoustic: relevant for submarine/sonar detection
  bool  can_fortify           = 8;  // Whether unit can improve protection via engineer work
  float fortify_bonus         = 9;  // Protection multiplier when fully fortified (e.g. 1.5)
  float fortify_time_hours    = 10; // Hours to reach full fortification
}

// ─── SENSORS ──────────────────────────────────────────────────────────────────
// A unit may have multiple sensor systems with different characteristics.
// The adjudicator evaluates each sensor against a target's signature and
// environmental conditions to determine detection probability per tick.

message SensorCapabilities {
  repeated SensorSystem sensors = 1;
}

message SensorSystem {
  string     name             = 1;  // e.g. "AN/TPY-2 Radar", "FLIR", "Mark-1 Eyeball"
  SensorType sensor_type      = 2;
  float      detection_range_m= 3;  // Range at which a standard target is first detected
  float      id_range_m       = 4;  // Range at which target type is identified
  float      tracking_range_m = 5;  // Range at which target can be continuously tracked
  bool       all_weather      = 6;  // If false, range degrades significantly in precipitation/fog
  bool       night_capable    = 7;  // If false, range degrades to ~10% at night
  float      arc_degrees      = 8;  // 360 = omnidirectional; <360 = directional (e.g. nose radar)
  float      arc_bearing      = 9;  // Center bearing of directional sensor arc (degrees true)
}

enum SensorType {
  SENSOR_UNSPECIFIED  = 0;
  SENSOR_OPTICAL      = 1;  // Visual/EO: weather/night dependent
  SENSOR_THERMAL_IR   = 2;  // FLIR/TIS: night capable, degraded in heavy rain
  SENSOR_RADAR_GROUND = 3;  // Ground surveillance radar
  SENSOR_RADAR_AIR    = 4;  // Air search radar
  SENSOR_SIGINT       = 5;  // Detects emissions, not physical presence
  SENSOR_ACOUSTIC     = 6;  // Sonar, acoustic ground sensors
  SENSOR_HUMAN        = 7;  // HUMINT: patrol/observation post
  SENSOR_SAR          = 8;  // Synthetic aperture radar: all-weather, day/night
}

// ─── COMMAND CAPABILITY ───────────────────────────────────────────────────────
// Non-zero only for UnitFunction = FUNCTION_COMMAND.
// Defines the C2 envelope this HQ projects over its subordinates.

message CommandCapabilities {
  float command_radius_m      = 1;  // Range within which subordinates receive C2 bonus
  int32 max_subordinates      = 2;  // Span of control limit
  float c2_effectiveness      = 3;  // 0.0–1.0: baseline C2 quality this HQ provides
  bool  has_fscoord           = 4;  // Can coordinate indirect fire missions (FSCOORD)
  bool  has_air_liaison       = 5;  // Can coordinate close air support (ALO/JTAC)
  float comms_range_m         = 6;  // Radio range to higher and subordinate units
}

// ─── ELECTRONIC WARFARE ───────────────────────────────────────────────────────
// Non-zero only for UnitFunction = FUNCTION_ELECTRONIC_WARFARE.

message EWCapabilities {
  float jamming_radius_m      = 1;  // Radius within which enemy comms/sensors are degraded
  float jamming_effectiveness = 2;  // 0.0–1.0: fraction of enemy sensor range reduced
  float sigint_range_m        = 3;  // Range to intercept enemy radio/radar emissions
  bool  can_spoof             = 4;  // Can generate false radar contacts (deception)
  bool  can_direction_find    = 5;  // Can geolocate enemy emitters via DF
}

// ─── LOGISTICS PROFILE ────────────────────────────────────────────────────────
// Consumption rates that connect a unit to the supply chain.
// Phase 1: used to compute fuel depletion and ammo expenditure per tick.
// Phase 3: consumption rates multiply against commodity stock levels at the
// connected logistics node; shortfalls trigger combat effectiveness penalties.

message LogisticsProfile {
  float fuel_capacity_liters    = 1;
  float fuel_consumption_idle   = 2;  // Liters/hour: stationary, engines running
  float fuel_consumption_move   = 3;  // Liters/hour: moving at road speed
  float fuel_consumption_combat = 4;  // Liters/hour: active engagement
  float ammo_basic_loads        = 5;  // Number of basic loads carried organically
  float resupply_time_hours     = 6;  // Hours to complete a full resupply from adjacent node
  float maintenance_rate        = 7;  // Phase 3: equipment failures per 24h of operations
  string primary_commodity_id   = 8;  // Phase 3: e.g. "fuel_diesel", "ammo_155mm"
}
